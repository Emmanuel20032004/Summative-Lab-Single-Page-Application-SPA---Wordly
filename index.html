<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordly</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>WORDLY</h1>
        <p>Wordly, your daily source of vocabulary!</p>
    </header>

    <main>
        <!-- Search form -->
        <form id="word-search">
            <input
            type="text"
            id="word-search-input"
            placeholder="learn a new word"
            aria-label="enter a word to search"
            required
            />
        </form>

        <!-- results rendering -->
        <section id="display">
            <div class="name-audio-button">
                <h2 id="searched-name"></h2>
                <button id="audio-button" class="audio-button" disabled></button>
            </div>
            <p id="phonetic"></p>
            <div id="meanings"></div>
        </section>

        <!-- hidden audio element used to play pronunciation -->
        <audio id="word-audio"></audio>
    </main>

    <script src="script.js"></script>
</body>
</html>
